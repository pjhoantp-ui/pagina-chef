<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Coffee Break</title>

<style>
body{margin:0;font-family:Segoe UI;background:#fef6f0}
.container{max-width:1000px;margin:auto;padding:60px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
.box{background:white;padding:20px;border-radius:12px}
.hero{width:100%;border-radius:15px;margin-bottom:30px}
h1{text-align:center;color:#d63384}
</style>
</head>

<body>

<div class="container">

<h1>Coffee Break</h1>

<img src="https://i.imgur.com/Ao64ckF.jpg" class="hero">

<div class="grid">

<div class="box">
<h3>Bebidas</h3>
<ul>
<li>Café</li>
<li>Té</li>
<li>Refresco</li>
<li>Vino espumoso</li>
</ul>
</div>

<div class="box">
<h3>Bocadillos</h3>
<ul>
<li>Galletas</li>
<li>Bocadillos dulces</li>
<li>Bocadillos salados</li>
</ul>
</div>

</div>

</div>

</body>
</html>
